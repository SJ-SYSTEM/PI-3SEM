{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema de Farmácia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body>

<div class="login-bg">

    <div class="shape-top"></div>
    <div class="shape-bottom"></div>

    <div class="login-card">

        <div class="logo-area">
            <div class="logo-circle"><img src="../../static/core/img/FarmaciaLogo.png" class="logo"></div>

            <h2>Bem-vindo</h2>

            <p class="text-muted">
                Acesse sua conta para continuar
            </p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">
                    E-mail
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Digite seu e-mail"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Senha
                </label>

                <input
                    type="password"
                    name="senha"
                    class="form-control"
                    placeholder="Digite sua senha"
                    required
                >
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="lembrar">
                    <label class="form-check-label">
                        Lembrar-me
                    </label>
                </div>

                <a href="#" class="link-red">
                    Esqueceu a senha?
                </a>

            </div>

            <button type="submit" class="btn btn-login w-100">
                Entrar
            </button>
        </form>

        <a href="{% url 'cadastro' %}" class="btn btn-cadastro w-100 mt-3">
            Criar Conta
        </a>

    </div>

    <div class="footer-text">
        2026 Sistema de Farmácia
    </div>

</div>

</body>
</html>

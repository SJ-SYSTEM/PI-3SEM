<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste do Projeto Farmácia</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background-color: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-top: 5px solid #2ecc71;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        p {
            color: #7f8c8d;
            font-size: 1.1em;
        }
        .status {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 15px;
            background-color: #e8f8f5;
            color: #2ecc71;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>💊 Sistema Farmácia</h1>
        <p>Seu projeto Django foi estruturado com sucesso!</p>
        
        <p><em>{{ mensagem }}</em></p>
        
        <div class="status">Ambiente de Teste Ativo</div>
    </div>

</body>
</html>
